name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: pytest (Python ${{ matrix.python-version }})
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        python-version: ["3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 #v4.3.1

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 #v6.2.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 #v8.2.0
        with:
          enable-cache: true
          cache-dependency-glob: "requirements_test.txt"

      - name: Install system dependencies
        # libturbojpeg: HA's camera component imports turbojpeg unconditionally.
        # libopus0:     voip-utils imports opuslib which dlopen()s the native
        #               libopus C library at module import time.
        run: sudo apt-get update && sudo apt-get install -y libturbojpeg0-dev libopus0

      - name: Install Python dependencies
        run: uv pip install --system --prerelease=allow -r requirements_test.txt

      - name: Run pytest
        run: pytest tests/components/intratone/ -v -n auto --tb=short

  hassfest:
    name: hassfest
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 #v4.3.1
      - uses: home-assistant/actions/hassfest@e91ad1948e57189485b9c1ad608af0c303946f89 #master

  hacs:
    name: HACS validation
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 #v4.3.1
      - uses: hacs/action@d556e736723344f83838d08488c983a15381059a #22.5.0
        with:
          category: integration
        env:
          REPOSITORY_REF: ${{ github.head_ref || github.ref_name }}
