name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: pytest (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: requirements_test.txt

      - name: Install system dependencies
        # libturbojpeg: HA's camera component imports turbojpeg unconditionally.
        # libopus0:     voip-utils imports opuslib which dlopen()s the native
        #               libopus C library at module import time.
        run: sudo apt-get update && sudo apt-get install -y libturbojpeg0-dev libopus0

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements_test.txt

      - name: Run pytest
        run: pytest tests/components/intratone/ -v -n auto

  hassfest:
    name: hassfest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: home-assistant/actions/hassfest@master

  hacs:
    name: HACS validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hacs/action@main
        with:
          category: integration
        env:
          REPOSITORY_REF: ${{ github.head_ref || github.ref_name }}
