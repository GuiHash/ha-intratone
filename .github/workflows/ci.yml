name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: pytest (Python ${{ matrix.python-version }})
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        python-version: ["3.13"]
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 #v4.3.1

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 #v6.2.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: requirements_test.txt

      - name: Install system dependencies
        # libturbojpeg: HA's camera component imports turbojpeg unconditionally.
        # libopus0:     voip-utils imports opuslib which dlopen()s the native
        #               libopus C library at module import time.
        run: sudo apt-get update && sudo apt-get install -y libturbojpeg0-dev libopus0

      - name: Install Python dependencies
        run: pip install --disable-pip-version-check -r requirements_test.txt

      - name: Run pytest
        run: pytest tests/components/intratone/ -v -n auto --tb=short

  hassfest:
    name: hassfest
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 #v4.3.1
      - uses: home-assistant/actions/hassfest@f6f29a7ee3fa0eccadf3620a7b9ee00ab54ec03b #master

  hacs:
    name: HACS validation
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 #v4.3.1
      - uses: hacs/action@d556e736723344f83838d08488c983a15381059a #22.5.0
        with:
          category: integration
        env:
          REPOSITORY_REF: ${{ github.head_ref || github.ref_name }}
