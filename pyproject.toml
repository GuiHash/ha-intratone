[tool.ruff]
# Oldest Python in the CI matrix.
target-version = "py312"
# Default rule set (E4/E7/E9 + F) — lint for real defects, not style.

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
asyncio_default_fixture_loop_scope = "function"
# opuslib uses `is not 0` instead of `!= 0` — upstream bug, not ours
filterwarnings = ["ignore::SyntaxWarning:opuslib"]
